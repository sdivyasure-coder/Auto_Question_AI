<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Question Paper Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --primary: #00ff9c;
            --secondary: #00f0ff;
            --accent: #8b5cf6;
            --primary-rgb: 0, 255, 156;
            --secondary-rgb: 0, 240, 255;
            --accent-rgb: 139, 92, 246;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --border: rgba(0, 255, 156, 0.3);
            --glow-green: 0 0 24px rgba(0, 255, 156, 0.35);
            --glow-cyan: 0 0 24px rgba(0, 240, 255, 0.35);
            --shadow-card: 0 18px 40px rgba(0, 0, 0, 0.5);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 10px;
        }

        :root[data-theme="ocean"] {
            --primary: #22d3ee;
            --secondary: #3b82f6;
            --accent: #0ea5e9;
            --primary-rgb: 34, 211, 238;
            --secondary-rgb: 59, 130, 246;
            --accent-rgb: 14, 165, 233;
            --glow-green: 0 0 24px rgba(34, 211, 238, 0.35);
            --glow-cyan: 0 0 24px rgba(59, 130, 246, 0.35);
        }

        :root[data-theme="lime"] {
            --primary: #84cc16;
            --secondary: #22c55e;
            --accent: #10b981;
            --primary-rgb: 132, 204, 22;
            --secondary-rgb: 34, 197, 94;
            --accent-rgb: 16, 185, 129;
            --glow-green: 0 0 24px rgba(132, 204, 22, 0.35);
            --glow-cyan: 0 0 24px rgba(34, 197, 94, 0.35);
        }

        :root[data-theme="sunset"] {
            --primary: #f97316;
            --secondary: #ef4444;
            --accent: #f59e0b;
            --primary-rgb: 249, 115, 22;
            --secondary-rgb: 239, 68, 68;
            --accent-rgb: 245, 158, 11;
            --glow-green: 0 0 24px rgba(249, 115, 22, 0.35);
            --glow-cyan: 0 0 24px rgba(239, 68, 68, 0.35);
        }

        :root[data-theme="rose"] {
            --primary: #ec4899;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --primary-rgb: 236, 72, 153;
            --secondary-rgb: 168, 85, 247;
            --accent-rgb: 244, 63, 94;
            --glow-green: 0 0 24px rgba(236, 72, 153, 0.35);
            --glow-cyan: 0 0 24px rgba(168, 85, 247, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: "JetBrains Mono", monospace;
            color: var(--text);
            background: var(--bg);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(transparent 95%, rgba(0, 255, 156, 0.12) 96%),
                linear-gradient(90deg, transparent 95%, rgba(0, 240, 255, 0.12) 96%);
            background-size: 48px 48px, 48px 48px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
            animation: gridDrift 16s linear infinite;
        }

        body::after {
            content: "";
            position: fixed;
            inset: -20%;
            background:
                radial-gradient(circle at 20% 30%, rgba(0, 255, 156, 0.14) 0%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(0, 240, 255, 0.12) 0%, transparent 60%),
                radial-gradient(circle at 60% 85%, rgba(139, 92, 246, 0.12) 0%, transparent 60%);
            animation: floatGradient 14s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        #side-toggle {
            display: none;
        }

        .page-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 270px minmax(0, 1fr);
            position: relative;
            z-index: 1;
            transition: grid-template-columns 0.3s ease;
            animation: pageFade 0.45s ease both;
        }

        .side-nav {
            padding: 24px 18px;
            background: var(--card);
            border-right: 1px solid rgba(0, 255, 156, 0.2);
            box-shadow: var(--shadow-card);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            animation: slideIn 0.6s ease both;
        }

        .brand-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .brand-mark {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: var(--glow-green);
        }

        .brand {
            margin: 0;
            font-size: 1rem;
            letter-spacing: 0.3px;
        }

        .brand-sub {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        .role-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(0, 255, 156, 0.4);
            background: rgba(0, 255, 156, 0.1);
            color: var(--text);
            font-size: 0.75rem;
            margin-bottom: 18px;
        }

        .nav-links {
            display: grid;
            gap: 10px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid transparent;
            background: transparent;
            display: flex;
            align-items: center;
            gap: 0;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            position: relative;
        }

        .nav-links a:hover {
            transform: translateX(6px);
            border-color: rgba(0, 255, 156, 0.5);
            background: rgba(0, 255, 156, 0.08);
            box-shadow: var(--glow-green);
        }

        .nav-links a.active {
            border-color: rgba(0, 240, 255, 0.5);
            background: linear-gradient(135deg, rgba(0, 255, 156, 0.14), rgba(0, 240, 255, 0.12));
            box-shadow: var(--glow-cyan);
            animation: pulseGlow 2.2s ease-in-out infinite;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: 6px;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .nav-links a.active::after {
            transform: scaleX(1);
        }

        .main-pane {
            padding: 20px 24px 30px;
            animation: pageReveal 0.35s ease both;
            transition: filter 0.3s ease, opacity 0.3s ease;
        }

        .page-transition-out .main-pane {
            opacity: 0;
            filter: blur(6px);
            transform: translateX(-8px);
            transition: opacity 0.4s ease, filter 0.4s ease, transform 0.4s ease;
        }

        .page-transition-in .main-pane {
            animation: pageSlideIn 0.5s ease both;
        }

        .topbar-shell {
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(0, 255, 156, 0.2);
            background: rgba(22, 27, 34, 0.85);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(10px);
        }

        .toggle-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 156, 0.3);
            background: rgba(0, 255, 156, 0.1);
            color: var(--text);
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        .toggle-btn:hover {
            border-color: rgba(0, 240, 255, 0.6);
            transform: translateY(-1px);
        }

        .search-wrap {
            flex: 1;
            min-width: 180px;
            position: relative;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-wrap input {
            width: 100%;
            height: 42px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 156, 0.25);
            background: rgba(13, 17, 23, 0.8);
            color: var(--text);
            padding: 0 12px;
            font: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .search-wrap input:focus {
            outline: none;
            border-color: rgba(0, 255, 156, 0.8);
            box-shadow: 0 0 0 3px rgba(0, 255, 156, 0.2);
        }

        .search-button {
            height: 42px;
            padding: 0 16px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 156, 0.35);
            background: rgba(13, 17, 23, 0.7);
            color: var(--text);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .search-button:hover {
            transform: translateY(-1px);
            border-color: rgba(0, 255, 156, 0.7);
            box-shadow: var(--glow-green);
        }

        .status-chip {
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid rgba(0, 255, 156, 0.5);
            background: rgba(0, 255, 156, 0.12);
            color: var(--text);
            font-size: 0.78rem;
            white-space: nowrap;
        }

        .theme-picker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .theme-picker label {
            margin: 0;
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .theme-select {
            width: auto;
            min-width: 136px;
            height: 38px;
            border-radius: 10px;
            border: 1px solid rgba(var(--primary-rgb), 0.35);
            background: rgba(13, 17, 23, 0.85);
            color: var(--text);
            font: inherit;
            padding: 0 10px;
            cursor: pointer;
        }

        .theme-select:focus {
            outline: none;
            border-color: rgba(var(--primary-rgb), 0.8);
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.2);
        }

        .topbar {
            margin-bottom: 18px;
            padding: 18px;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(0, 255, 156, 0.2);
            background: rgba(22, 27, 34, 0.85);
            box-shadow: var(--shadow-card);
        }

        .topbar h1,
        h2,
        h3 {
            margin: 0;
            font-family: "Orbitron", sans-serif;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        .topbar p,
        .helper {
            color: var(--text-muted);
        }

        .panel {
            border-radius: var(--radius-lg);
            padding: 18px;
            border: 1px solid rgba(0, 255, 156, 0.2);
            background: rgba(22, 27, 34, 0.85);
            box-shadow: var(--shadow-card);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            animation: cardRise 0.5s ease both;
        }

        .panel::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            background: linear-gradient(
                120deg,
                rgba(0, 255, 156, 0.18) 0%,
                rgba(255, 255, 255, 0) 30%,
                rgba(0, 240, 255, 0.1) 62%,
                rgba(139, 92, 246, 0.12) 100%
            );
            mix-blend-mode: normal;
        }

        .panel::after {
            content: "";
            position: absolute;
            left: 16px;
            right: 16px;
            top: 0;
            height: 2px;
            background: linear-gradient(90deg, rgba(0, 255, 156, 0.8), rgba(0, 240, 255, 0.7));
            opacity: 0.7;
            pointer-events: none;
        }

        .panel:hover {
            transform: translateY(-5px);
            box-shadow: var(--glow-cyan);
        }

        .panel:active {
            transform: translateY(-2px) scale(0.99);
        }

        .grid-two {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .grid-three {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .grid-four {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .stat-card {
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(0, 255, 156, 0.2);
            background: rgba(22, 27, 34, 0.85);
            box-shadow: var(--glow-green);
            animation: cardRise 0.5s ease both;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--glow-cyan);
        }

        .stat-card:active {
            transform: translateY(-2px) scale(0.99);
        }

        .stat-card h3 {
            font-size: 1.6rem;
            margin: 0;
        }

        .stat-card p {
            margin: 6px 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .button {
            border: 1px solid rgba(0, 255, 156, 0.35);
            border-radius: 12px;
            padding: 10px 16px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text);
            background: rgba(13, 17, 23, 0.6);
            transition: transform 0.2s ease, box-shadow 0.25s ease, border-color 0.2s ease, filter 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .button:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 255, 156, 0.7);
            box-shadow: var(--glow-green);
        }

        .button:active {
            transform: scale(0.95);
            filter: brightness(1.05);
        }

        .button::after {
            content: "";
            position: absolute;
            inset: -120% auto auto -120%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(0, 255, 156, 0.35), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .button:hover::after {
            opacity: 1;
        }

        .button.is-loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .button.is-loading::before {
            content: "";
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--secondary);
            position: absolute;
            right: 16px;
            animation: spin 0.7s linear infinite;
        }

        .button.is-loading .btn-text {
            opacity: 0;
        }

        .button .btn-text {
            transition: opacity 0.2s ease;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s ease-out;
            background: rgba(0, 255, 156, 0.35);
            pointer-events: none;
        }

        .button-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: #ffffff;
            box-shadow: var(--glow-green);
            position: relative;
            overflow: hidden;
        }

        .button-primary::after {
            content: "";
            position: absolute;
            top: -140%;
            left: -30%;
            width: 45%;
            height: 300%;
            transform: rotate(22deg);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0));
            pointer-events: none;
        }

        .button-muted {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.14), rgba(139, 92, 246, 0.14));
            border-color: rgba(0, 240, 255, 0.4);
            color: var(--text);
        }

        .button:disabled,
        .button[aria-disabled="true"] {
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
            box-shadow: none;
        }

        .form-row {
            display: grid;
            gap: 14px;
            margin-bottom: 14px;
        }

        .button-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .button-row-end {
            justify-content: flex-end;
        }

        .button-sm {
            padding: 7px 12px;
            font-size: 13px;
            border-radius: 10px;
        }

        .summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .summary h2 {
            margin: 0;
        }

        .summary span {
            font-size: 20px;
            font-weight: 700;
        }

        .search-result-note {
            color: var(--text-muted);
            font-size: 13px;
        }

        label {
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
        }

        .float-field {
            position: relative;
            margin-bottom: 18px;
        }

        .float-field label {
            position: absolute;
            left: 12px;
            top: 12px;
            background: rgba(13, 17, 23, 0.85);
            padding: 0 6px;
            transition: transform 0.2s ease, color 0.2s ease, font-size 0.2s ease;
            pointer-events: none;
        }

        .float-field input:focus + label,
        .float-field input:not(:placeholder-shown) + label,
        .float-field select:focus + label,
        .float-field select:not([value=""]) + label {
            transform: translateY(-18px);
            font-size: 0.68rem;
            color: var(--secondary);
        }

        input,
        select,
        textarea {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 156, 0.25);
            background: rgba(13, 17, 23, 0.7);
            color: var(--text);
            padding: 11px 12px;
            font: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: rgba(0, 255, 156, 0.9);
            box-shadow: 0 0 0 3px rgba(0, 255, 156, 0.25);
        }

        input:invalid:focus {
            animation: shake 0.3s ease;
            border-color: rgba(255, 77, 77, 0.8);
            box-shadow: 0 0 0 3px rgba(255, 77, 77, 0.2);
        }

        .table-wrap {
            overflow-x: auto;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-subject { background: rgba(0, 240, 255, 0.16); color: #7de9ff; }
        .badge-easy { background: rgba(0, 255, 156, 0.16); color: #8bffcc; }
        .badge-medium { background: rgba(56, 189, 248, 0.18); color: #8cdcff; }
        .badge-hard { background: rgba(248, 113, 113, 0.18); color: #ff9b9b; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 255, 156, 0.15);
            color: var(--text);
        }

        th {
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            font-size: 0.75rem;
        }

        .section-accent {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(0, 255, 156, 0.5);
            background: rgba(0, 255, 156, 0.12);
            color: var(--text);
            font-size: 0.78rem;
            margin-bottom: 10px;
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 156, 0.3);
            background: rgba(22, 27, 34, 0.95);
            color: var(--text);
            box-shadow: var(--glow-green);
            display: none;
            z-index: 10;
        }

        .toast.is-visible {
            display: block;
            animation: toastIn 0.35s ease;
        }

        .toast.is-hiding {
            animation: toastOut 0.25s ease forwards;
        }

        .toast.success {
            box-shadow: 0 0 24px rgba(0, 255, 156, 0.45);
        }

        .toast.error {
            border-color: rgba(255, 77, 77, 0.45);
            box-shadow: 0 0 24px rgba(255, 77, 77, 0.45);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(139, 148, 158, 0.35);
            border-top-color: var(--primary);
            animation: spin 0.7s linear infinite;
        }

        .spacer {
            height: 14px;
        }

        #side-toggle:checked ~ .page-shell {
            grid-template-columns: 90px minmax(0, 1fr);
        }

        #side-toggle:checked ~ .page-shell .side-nav {
            padding: 24px 12px;
        }

        #side-toggle:checked ~ .page-shell .brand,
        #side-toggle:checked ~ .page-shell .brand-sub,
        #side-toggle:checked ~ .page-shell .role-pill,
        #side-toggle:checked ~ .page-shell .nav-label {
            opacity: 0;
            pointer-events: none;
            width: 0;
            overflow: hidden;
            transform: translateX(-8px);
        }

        .brand,
        .brand-sub,
        .role-pill,
        .nav-label {
            transition: opacity 0.2s ease, transform 0.2s ease, width 0.2s ease;
        }

        @media (max-width: 1080px) {
            .page-shell {
                grid-template-columns: 1fr;
            }

            .side-nav {
                display: none;
            }

            .grid-four {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 760px) {
            .main-pane {
                padding: 12px;
            }

            .topbar-shell {
                flex-wrap: wrap;
            }

            .theme-picker {
                order: 2;
                margin-left: 0;
            }

            .search-wrap {
                max-width: 100%;
                order: 3;
                flex-basis: 100%;
            }

            .grid-two,
            .grid-three,
            .grid-four {
                grid-template-columns: 1fr;
            }
        }

        @keyframes pageReveal {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatGradient {
            from { transform: translate3d(-1%, -1%, 0) scale(1); }
            to { transform: translate3d(1%, 1%, 0) scale(1.05); }
        }

        @keyframes gridDrift {
            from { background-position: 0 0, 0 0; }
            to { background-position: 120px 60px, 60px 120px; }
        }

        @keyframes neonPulse {
            from { box-shadow: 0 0 0 rgba(0, 209, 255, 0); }
            to { box-shadow: 0 0 24px rgba(0, 209, 255, 0.16); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes toastIn {
            0% { opacity: 0; transform: translateX(24px); }
            70% { opacity: 1; transform: translateX(-4px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(16px); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-18px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes cardRise {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pageFade {
            from { opacity: 0; filter: blur(6px); }
            to { opacity: 1; filter: blur(0); }
        }

        @keyframes pageSlideIn {
            from { opacity: 0; transform: translateX(24px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .section-switch {
            opacity: 0;
            transform: translateY(12px);
            filter: blur(4px);
            transition: opacity 0.4s ease, transform 0.4s ease, filter 0.4s ease;
        }

        .section-switch.is-active {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }

        @keyframes ripple {
            to { transform: scale(2.5); opacity: 0; }
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            30% { transform: translateX(-4px); }
            60% { transform: translateX(4px); }
            100% { transform: translateX(0); }
        }

        .typing {
            position: relative;
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid var(--secondary);
            animation: typing 2.6s steps(28, end), blink 0.7s step-end infinite;
        }

        .glitch {
            position: relative;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            opacity: 0.7;
            clip-path: inset(0 0 0 0);
        }

        .glitch::before {
            color: var(--secondary);
            animation: glitchShift 2.6s infinite;
        }

        .glitch::after {
            color: var(--accent);
            animation: glitchShift 3.2s infinite reverse;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        @keyframes glitchShift {
            0% { transform: translate(0); }
            20% { transform: translate(-1px, 1px); }
            40% { transform: translate(1px, -1px); }
            60% { transform: translate(-2px, 0); }
            80% { transform: translate(2px, 1px); }
            100% { transform: translate(0); }
        }

        .fx-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .fx-layer span {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(0, 255, 156, 0.5);
            box-shadow: 0 0 12px rgba(0, 255, 156, 0.6);
            animation: floatParticle 8s ease-in-out infinite;
            opacity: 0.6;
        }

        .fx-layer span:nth-child(2n) {
            background: rgba(0, 240, 255, 0.5);
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.6);
            animation-duration: 10s;
        }

        .fx-layer span:nth-child(1) { top: 12%; left: 18%; }
        .fx-layer span:nth-child(2) { top: 38%; left: 8%; }
        .fx-layer span:nth-child(3) { top: 28%; left: 68%; }
        .fx-layer span:nth-child(4) { top: 62%; left: 82%; }
        .fx-layer span:nth-child(5) { top: 78%; left: 32%; }
        .fx-layer span:nth-child(6) { top: 16%; left: 78%; }
        .fx-layer span:nth-child(7) { top: 42%; left: 52%; }
        .fx-layer span:nth-child(8) { top: 88%; left: 70%; }
        .fx-layer span:nth-child(9) { top: 74%; left: 10%; }
        .fx-layer span:nth-child(10) { top: 8%; left: 52%; }
        .fx-layer span:nth-child(11) { top: 52%; left: 28%; }
        .fx-layer span:nth-child(12) { top: 30%; left: 88%; }

        body::before {
            background:
                linear-gradient(transparent 95%, rgba(var(--primary-rgb), 0.12) 96%),
                linear-gradient(90deg, transparent 95%, rgba(var(--secondary-rgb), 0.12) 96%);
            background-size: 48px 48px, 48px 48px;
        }

        body::after {
            background:
                radial-gradient(circle at 20% 30%, rgba(var(--primary-rgb), 0.14) 0%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(var(--secondary-rgb), 0.12) 0%, transparent 60%),
                radial-gradient(circle at 60% 85%, rgba(var(--accent-rgb), 0.12) 0%, transparent 60%);
        }

        .side-nav {
            border-right: 1px solid rgba(var(--primary-rgb), 0.2);
        }

        .nav-links a:hover {
            border-color: rgba(var(--primary-rgb), 0.5);
            background: rgba(var(--primary-rgb), 0.08);
        }

        .nav-links a.active {
            border-color: rgba(var(--secondary-rgb), 0.5);
            background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.14), rgba(var(--secondary-rgb), 0.12));
        }

        .topbar-shell,
        .topbar,
        .panel,
        .stat-card {
            border-color: rgba(var(--primary-rgb), 0.2);
        }

        input,
        select,
        textarea,
        .search-wrap input {
            border-color: rgba(var(--primary-rgb), 0.25);
        }

        input:focus,
        select:focus,
        textarea:focus,
        .search-wrap input:focus {
            border-color: rgba(var(--primary-rgb), 0.9);
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.25);
        }

        .search-button,
        .button {
            border-color: rgba(var(--primary-rgb), 0.35);
        }

        .search-button:hover,
        .button:hover {
            border-color: rgba(var(--primary-rgb), 0.7);
        }

        .status-chip,
        .section-accent,
        .role-pill {
            border-color: rgba(var(--primary-rgb), 0.5);
            background: rgba(var(--primary-rgb), 0.12);
        }

        .panel::before {
            background: linear-gradient(
                120deg,
                rgba(var(--primary-rgb), 0.18) 0%,
                rgba(255, 255, 255, 0) 30%,
                rgba(var(--secondary-rgb), 0.1) 62%,
                rgba(var(--accent-rgb), 0.12) 100%
            );
        }

        .panel::after {
            background: linear-gradient(90deg, rgba(var(--primary-rgb), 0.8), rgba(var(--secondary-rgb), 0.7));
        }

        .button::after,
        .ripple {
            background: rgba(var(--primary-rgb), 0.35);
        }

        .fx-layer span {
            background: rgba(var(--primary-rgb), 0.5);
            box-shadow: 0 0 12px rgba(var(--primary-rgb), 0.6);
        }

        .fx-layer span:nth-child(2n) {
            background: rgba(var(--secondary-rgb), 0.5);
            box-shadow: 0 0 12px rgba(var(--secondary-rgb), 0.6);
        }

        @keyframes floatParticle {
            0% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-14px); opacity: 0.8; }
            100% { transform: translateY(0); opacity: 0.4; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="fx-layer" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <input type="checkbox" id="side-toggle" aria-hidden="true">
    <div class="page-shell">
        <aside class="side-nav">
            <div class="brand-wrap">
                <div class="brand-mark">AQ</div>
                <div>
                    <h2 class="brand">AI Question Generator</h2>
                </div>
            </div>
            <nav class="nav-links">
                <a href="/dashboard"><span class="nav-label">Dashboard</span></a>
                {% if session.role in ['professor', 'student'] %}
                <a href="/generate"><span class="nav-label">Generate</span></a>
                <a href="/exam"><span class="nav-label">Online Exam</span></a>
                <a href="/chatbot"><span class="nav-label">Chatbot</span></a>
                {% endif %}
                {% if session.role == 'professor' %}
                <a href="/admin/questions"><span class="nav-label">question_codex_AI</span></a>
                <a href="/admin/exam_submissions"><span class="nav-label">Submissions</span></a>
                {% endif %}
            </nav>
        </aside>

        <main class="main-pane">
            <header class="topbar-shell">
                <label for="side-toggle" class="toggle-btn" title="Collapse sidebar">Menu</label>
                <div class="search-wrap">
                    <input id="global-search" type="text" placeholder="Search papers, questions, units..." aria-label="Search">
                    <button class="search-button" id="search-button" type="button">Search</button>
                </div>
                <div class="theme-picker">
                    <label for="theme-select">Theme</label>
                    <select id="theme-select" class="theme-select" aria-label="Choose UI color theme">
                        <option value="default">Cyber Mint</option>
                        <option value="ocean">Ocean Blue</option>
                        <option value="lime">Lime Green</option>
                        <option value="sunset">Sunset Orange</option>
                        <option value="rose">Rose Magenta</option>
                    </select>
                </div>
                <span class="status-chip">AI Engine: Live</span>
            </header>
            {% block content %}{% endblock %}
        </main>
    </div>
    <div class="toast" id="app-toast"></div>
    <script>
    (function () {
        document.body.classList.add("page-transition-in");
        const currentPath = window.location.pathname;
        document.querySelectorAll(".nav-links a").forEach(function (link) {
            const href = link.getAttribute("href");
            if (!href) {
                return;
            }
            if (href === currentPath || (href !== "/" && currentPath.startsWith(href))) {
                link.classList.add("active");
            }
        });

        const globalSearch = document.getElementById("global-search");
        const searchButton = document.getElementById("search-button");
        const themeSelect = document.getElementById("theme-select");
        const savedTheme = localStorage.getItem("app-theme") || "default";

        function applyTheme(themeName) {
            if (themeName && themeName !== "default") {
                document.documentElement.setAttribute("data-theme", themeName);
            } else {
                document.documentElement.removeAttribute("data-theme");
            }
            localStorage.setItem("app-theme", themeName || "default");
        }

        applyTheme(savedTheme);
        if (themeSelect) {
            themeSelect.value = savedTheme;
            themeSelect.addEventListener("change", function () {
                applyTheme(themeSelect.value);
            });
        }

        function runDefaultSearch(query) {
            if (!query) return;
            const canFind = typeof window.find === "function";
            if (!canFind) return;
            const found = window.find(query, false, false, true, false, false, false);
            if (!found && typeof window.appToast === "function") {
                window.appToast('No matches found for "' + query + '".');
            }
        }

        function emitSearch(source) {
            if (!globalSearch) return;
            const query = globalSearch.value.trim().toLowerCase();
            const searchEvent = new CustomEvent("app:search", {
                cancelable: true,
                detail: { query: query, source: source || "unknown" }
            });
            const notCanceled = document.dispatchEvent(searchEvent);
            if (notCanceled && source !== "input") {
                runDefaultSearch(query);
            }
        }
        if (globalSearch) {
            globalSearch.addEventListener("input", function () {
                emitSearch("input");
            });
            globalSearch.addEventListener("keydown", function (event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    emitSearch("enter");
                }
            });
        }
        if (searchButton) {
            searchButton.addEventListener("click", function () {
                emitSearch("button");
            });
        }

        window.appToast = function (message) {
            const toast = document.getElementById("app-toast");
            if (!toast) return;
            toast.classList.remove("success", "error");
            toast.textContent = message;
            toast.classList.add("is-visible");
            setTimeout(() => {
                toast.classList.add("is-hiding");
                setTimeout(() => {
                    toast.classList.remove("is-visible", "is-hiding");
                }, 250);
            }, 2000);
        };

        window.appToastWithType = function (message, type) {
            const toast = document.getElementById("app-toast");
            if (!toast) return;
            toast.classList.remove("success", "error");
            if (type) {
                toast.classList.add(type);
            }
            toast.textContent = message;
            toast.classList.add("is-visible");
            setTimeout(() => {
                toast.classList.add("is-hiding");
                setTimeout(() => {
                    toast.classList.remove("is-visible", "is-hiding");
                }, 250);
            }, 2200);
        };

        document.querySelectorAll(".button").forEach(function (btn) {
            if (!btn.querySelector(".btn-text")) {
                const span = document.createElement("span");
                span.className = "btn-text";
                span.textContent = btn.textContent.trim();
                btn.textContent = "";
                btn.appendChild(span);
            }

            btn.addEventListener("click", function (event) {
                const ripple = document.createElement("span");
                ripple.className = "ripple";
                const rect = btn.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + "px";
                ripple.style.left = (event.clientX - rect.left - size / 2) + "px";
                ripple.style.top = (event.clientY - rect.top - size / 2) + "px";
                btn.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);

                if (btn.dataset.loading === "true") {
                    btn.classList.add("is-loading");
                    setTimeout(() => btn.classList.remove("is-loading"), 1600);
                }
            });
        });

        document.querySelectorAll("a[href]").forEach(function (link) {
            const href = link.getAttribute("href");
            if (!href || href.startsWith("#") || href.startsWith("javascript:")) {
                return;
            }
            if (link.target === "_blank" || link.hasAttribute("download")) {
                return;
            }
            link.addEventListener("click", function (event) {
                if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
                    return;
                }
                event.preventDefault();
                document.body.classList.add("page-transition-out");
                setTimeout(function () {
                    window.location.href = href;
                }, 420);
            });
        });

        document.querySelectorAll(".section-switch").forEach(function (section, idx) {
            if (idx === 0) {
                section.classList.add("is-active");
            }
        });

        document.querySelectorAll("[data-switch-target]").forEach(function (btn) {
            btn.addEventListener("click", function () {
                const target = btn.getAttribute("data-switch-target");
                document.querySelectorAll(".section-switch").forEach(function (section) {
                    const name = section.getAttribute("data-section");
                    section.classList.toggle("is-active", name === target);
                });
            });
        });
    })();
    </script>
</body>
</html>
