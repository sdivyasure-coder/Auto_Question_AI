<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AI Question Paper Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6d5cff;
            --secondary: #00d1ff;
            --bg-0: #050814;
            --bg-1: #0b0f27;
            --bg-2: #151a42;
            --text: #f8fafc;
            --text-muted: #cbd5f5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            display: grid;
            place-items: center;
            color: var(--text);
            background: linear-gradient(135deg, var(--bg-0), var(--bg-1) 40%, var(--bg-2));
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(109, 92, 255, 0.45), transparent 45%),
                radial-gradient(circle at 80% 30%, rgba(0, 209, 255, 0.36), transparent 40%);
            pointer-events: none;
        }

        .auth-card {
            width: min(460px, 92vw);
            padding: 32px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 22px 60px rgba(7, 9, 24, 0.5);
            backdrop-filter: blur(18px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        h1 {
            margin: 0;
            font-size: 1.6rem;
            font-family: "Rajdhani", sans-serif;
            letter-spacing: 0.3px;
        }

        p {
            margin: 8px 0 0;
            color: var(--text-muted);
        }

        label {
            display: block;
            margin: 16px 0 6px;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(15, 23, 42, 0.6);
            color: var(--text);
            font: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: rgba(6, 182, 212, 0.7);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.18);
        }

        .button {
            margin-top: 20px;
            width: 100%;
            padding: 12px 16px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            color: #f8fafc;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 16px 30px rgba(79, 70, 229, 0.35);
        }

        .footer {
            margin-top: 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .footer a {
            color: #dbeafe;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <div class="brand-mark">AQ</div>
            <div>
                <h1>Create account</h1>
                <p>Set up your workspace in seconds.</p>
            </div>
        </div>
        <form>
            <label for="name">Full Name</label>
            <input id="name" type="text" placeholder="Alex Carter" required>
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@college.edu" required>
            <label for="role">Role</label>
            <select id="role" required>
                <option>Professor</option>
                <option>Student</option>
            </select>
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Create a password" required>
            <button class="button" type="submit">Register</button>
        </form>
        <div class="footer">Already have an account? <a href="/login">Log in</a></div>
    </div>
</body>
</html>
